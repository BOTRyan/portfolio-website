<!DOCTYPE HTML>
<html lang="en">

<head>
    <title>Contact | Ryan O'Connor</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Ryan O'Connor, a .NET Full Stack Developer specializing in C#, ASP.NET Core, SQL Server, JavaScript, HTML, and CSS." />
    <meta name="author" content="Ryan O'Connor">
    <meta name="theme-color" content="#1E293B">
    <meta name="robots" content="index, follow">
    <meta name="color-scheme" content="light">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/contact.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <script src="/js/header.js" defer></script>
    <script src="/js/footer.js" defer></script>
    <script src="/js/contact.js" defer></script>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
</head>

<body>
    <div class="header-skip-link">
        <a href="#maincontent" tabindex="1">Skip to Main Content</a>
    </div>
    <header id="header" class="header"></header>
    <div class="header-mobile-menu">
        <nav class="header-mobile-nav">
            <a href="/">Home</a>
            <a href="/projects/">Projects</a>
            <a href="/contact/">Contact</a>
        </nav>
    </div>
    <div class="header-mobile-backdrop"></div>
    <main class="main">
        <section id="maincontent" class="contact" tabindex="0">
            <h1>Contact</h1>
            <p class="email-form-direct">
                Feel free to reach out if you'd like to connect, collaborate, or discuss opportunities with the form below.
                <br>Or email me directly at
                <a href="mailto:oconnorkryan@gmail.com">oconnorkryan@gmail.com</a>.
            </p>
        </section>
        <section class="contact">
            <form action="https://formspree.io/f/xaqzkzel" aria-label="Email" method="POST" class="email-form">
                <div class="email-form-group">
                    <h2>Email</h2>
                    <div class="email-form-item">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" autocomplete="name" required>
                    </div>

                    <div class="email-form-item">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" placeholder="Your Email" autocomplete="email" required>
                    </div>

                    <div class="email-form-item">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" maxlength="2000" rows="6" placeholder="Tell me about your project, opportunity, or question." required></textarea>
                        <div id="messageCharCountParent" class="email-character-count">
                            Character Count:
                            <span id="messageCharCount" aria-live="polite" aria-atomic="true">0</span> / 2000
                        </div>
                    </div>

                    <div class="email-form-item removeTopMargin">
                        <button type="submit" aria-label="Send Email">Send Message</button>
                    </div>
                    <p class="email-form-status removeTopMargin" aria-live="polite">test</p>
                </div>
            </form>
        </section>
    </main>
    <footer id="footer" class="footer"></footer>
</body></html>
